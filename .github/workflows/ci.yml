name: Spring Boot CI/CD

on:
  push:
    branches:
      - master
      - main

  pull_request:
    branches:
      - master
      - main

jobs:
  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      - name: Run Unit Tests
        run: mvn test

      - name: Build Spring Boot Project
        run: mvn clean package -DskipTests

      - name: Build Docker Image
        run: docker build -t kaif3108/spring-boot-crud:v2.0.0 .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        run: docker push kaif3108/spring-boot-crud:v2.0.0

      - name: Kubernetes Deployment (Placeholder)
        run: |
          echo "To deploy automatically, configure a Kubernetes cluster and KUBECONFIG secret."
          echo "Example:"
          echo "kubectl apply -f k8s/product-v1/"
          echo "kubectl apply -f k8s/product-v1-1/"
          echo "kubectl apply -f k8s/product-v2/"

      - name: Post Deployment Health Check (Placeholder)
        run: |
          echo "Integration tests would run here after deployment."
          echo "Example:"
          echo "curl http://localhost:9191/health"