apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: spring-boot-ingress
  namespace: spring-boot

spec:
  rules:
    - host: springboot.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spring-boot-service
                port:
                  number: 9191