apiVersion: apps/v1
kind: Deployment

metadata:
  name: spring-boot-v1-1
  namespace: product-v1-1

spec:
  replicas: 1

  selector:
    matchLabels:
      app: spring-boot-v1-1

  template:
    metadata:
      labels:
        app: spring-boot-v1-1

    spec:
      containers:
        - name: spring-boot-v1-1
          image: kaif3108/spring-boot-crud:v1.1.0
          imagePullPolicy: Always

          ports:
            - containerPort: 9191

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            httpGet:
              path: /health
              port: 9191
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /health
              port: 9191
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6